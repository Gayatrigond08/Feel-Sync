services:
  - type: web
    name: feelsync-service
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        value: your-db-host
      - key: DB_USER
        value: your-db-user
      - key: DB_PASSWORD
        value: your-db-password
      - key: DB_NAME
        value: feel_sync_db
      - key: DB_PORT
        value: "3306"
      - key: OPENAI_API_KEY
        value: your-openai-key
      - key: GROQ_API_KEY
        value: your-groq-key
